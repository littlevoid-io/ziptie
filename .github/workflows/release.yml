name: Automated Ziptie Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Compile and Publish Standalone Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Project Dependencies
        run: bun install

      - name: Run CLI Override Parser Unit Tests
        run: bun run test

      - name: Run PowerShell Bootstrap Pester Tests
        run: bun run test:pester

      - name: Run Core Module Unit Tests
        run: bun run test:unit

      - name: Compile Standalone Windows Executable
        run: bun run package

      - name: Publish Release via GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          gh release view "v$version" > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh release create "v$version" --title "Ziptie Release v$version" --notes "Automated precompiled system foundation release."
          }
          gh release upload "v$version" dist/ziptie.zip --clobber
